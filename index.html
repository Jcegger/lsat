<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LSAT — Jay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F2;--card:#fff;--border:#E8E6E0;--text:#1a1a1a;--muted:#888;--faint:#bbb;
  --purple:#6D28D9;--purple-lt:#EDE9FE;--purple-border:#C4B5FD;
  --green:#166534;--green-lt:#DCFCE7;
  --blue:#1D4ED8;--blue-lt:#DBEAFE;
  --amber:#92400E;--amber-lt:#FEF3C7;
  --pink:#9D174D;--pink-lt:#FCE7F3;
  --gray:#666;--gray-lt:#F1F0EC;
  --yellow:#713F12;--yellow-lt:#FEF9C3;
  --red:#991B1B;--red-lt:#FEE2E2;
}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
body{max-width:680px;margin:0 auto;display:flex;flex-direction:column}
.mono{font-family:'DM Mono',monospace}

nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{flex:none;padding:11px 13px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
nav button.active{color:var(--purple);border-bottom-color:var(--purple)}
nav button:hover:not(.active){color:var(--text)}

main{flex:1;padding:14px}
.section{display:none}.section.active{display:block}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.card-sm{padding:12px}
.sec-title{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px;text-align:center}
.stat-num{font-family:'DM Mono',monospace;font-size:22px;font-weight:500}
.stat-label{font-size:10px;color:var(--muted);margin-top:1px;text-transform:uppercase;letter-spacing:.04em}
.stat-sub{font-size:10px;color:var(--faint);margin-top:1px}

.tag{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;letter-spacing:.03em;display:inline-block;vertical-align:middle}
.tag-book{background:var(--purple-lt);color:var(--purple)}
.tag-rc{background:var(--blue-lt);color:var(--blue)}
.tag-lr{background:var(--green-lt);color:var(--green)}
.tag-condr{background:var(--yellow-lt);color:var(--yellow)}
.tag-pt{background:var(--amber-lt);color:var(--amber)}
.tag-review{background:var(--pink-lt);color:var(--pink)}
.tag-rest{background:var(--gray-lt);color:var(--gray)}

.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.82}
.btn-primary{background:var(--purple);color:#fff}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:5px 9px;font-size:11px}
.btn-danger{background:var(--red-lt);color:var(--red)}
.btn-success{background:var(--green-lt);color:var(--green)}

.countdowns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.cdcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.cdnum{font-family:'DM Mono',monospace;font-size:26px;font-weight:500}
.cdlabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:3px}

.fg{margin-bottom:11px}
.fg label{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:4px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
input[type=text],input[type=date],input[type=number],select,textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);color:var(--text);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--purple)}
textarea{resize:vertical;min-height:80px;line-height:1.55}
.form2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.week-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.week-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;transition:background .15s}
.week-hdr:hover{background:#FAFAF8}
.wk-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--faint);min-width:40px;letter-spacing:.04em}
.wk-title{font-size:13px;font-weight:500;flex:1}
.wk-dates{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint)}
.chevron{font-size:9px;color:var(--faint);transition:transform .2s;margin-left:4px}
.week-body{border-top:1px solid var(--border);display:none}
.week-body.open{display:block}

.day-row{display:grid;grid-template-columns:78px 1fr 26px;gap:8px;padding:9px 14px;border-bottom:1px solid #F5F4F0;align-items:start}
.day-row:last-child{border-bottom:none}
.day-row.is-today{background:#F5F3FF}
.day-row.is-rest{opacity:.55}
.day-dname{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);padding-top:1px;line-height:1.4}
.day-task{font-size:13px;line-height:1.5;margin-bottom:3px}
.day-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.day-note-text{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic}
.note-row{display:flex;gap:6px;margin-top:7px}
.note-row input{flex:1;min-width:0;padding:6px 9px;font-size:12px}
.note-row button{padding:6px 10px;font-size:12px;white-space:nowrap}
.check-btn{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.check-btn.done{background:var(--green);border-color:var(--green);color:#fff}
.check-btn:hover:not(.done){border-color:var(--green)}

.chart-wrap{width:100%;height:180px;margin:4px 0 0}
svg.ptchart{width:100%;height:100%;overflow:visible}

.miss-item{display:flex;gap:10px;align-items:start;padding:8px 0;border-bottom:1px solid #F5F4F0}
.miss-item:last-child{border-bottom:none}
.miss-badge{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.miss-meta{font-size:11px;color:var(--muted)}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin:4px 0}
.chip{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:10px;background:#F1F0EC;color:var(--muted);border:1px solid transparent;cursor:pointer;user-select:none;white-space:nowrap}
.chip.active{background:var(--purple-lt);color:var(--purple);border-color:var(--purple-border)}
.chip.readonly{cursor:default;background:var(--purple-lt);color:var(--purple)}
.zone-hdr{display:flex;align-items:center;gap:10px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--purple);text-transform:uppercase;letter-spacing:.12em;margin:18px 0 8px;padding:0 2px}
.zone-hdr:first-child{margin-top:4px}
.zone-hdr::after{content:'';flex:1;height:1px;background:var(--border)}

.weak-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #F5F4F0}
.weak-row:last-child{border-bottom:none}
.weak-name{font-family:'DM Mono',monospace;font-size:11px;min-width:130px}
.weak-bar-bg{flex:1;background:#F1F0EC;border-radius:4px;height:7px;overflow:hidden}
.weak-bar{height:100%;border-radius:4px;background:var(--pink);transition:width .3s}
.weak-ct{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);min-width:28px;text-align:right}

.addendum-area{width:100%;min-height:320px;border:1px solid var(--border);border-radius:8px;padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.7;background:var(--card);outline:none;resize:vertical;color:var(--text)}
.addendum-meta{display:flex;justify-content:space-between;margin-top:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--faint)}

.cl-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F5F4F0}
.cl-item:last-child{border-bottom:none}
.cl-check{width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:var(--purple)}
.cl-label{font-size:14px;flex:1}
.cl-label.done{text-decoration:line-through;color:var(--muted)}

.snote{padding:9px 0;border-bottom:1px solid #F5F4F0}
.snote:last-child{border-bottom:none}
.snote-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);margin-bottom:2px}
.snote-text{font-size:13px;line-height:1.45}

.empty{text-align:center;padding:36px 16px;color:var(--faint);font-size:13px}

@media(max-width:400px){
  .form2{grid-template-columns:1fr}
  .weak-name{min-width:100px}
  nav button{padding:10px 10px;font-size:9px}
}
</style>
</head>

  done:     load('done',{}),       // { 'YYYY-MM-DD': {ts, note} }
  pts:      load('pts',[]),        // [{num,date,score,lr,rc,note}]
  misses:   load('misses',[]),     // [{ts,section,type,tags:[],correct,ref,trap,note}] — type = single 7sage type id; tags = stimulus tag ids; note = lesson
  sessions: load('sessions',[]),   // [{ts,date,topics:[],total,correct,note}] — drill sessions; topics = stimulus tag ids drilled
};
function persist(){ save('done',S.done);save('pts',S.pts);save('misses',S.misses);save('sessions',S.sessions); syncRemote(); }

function setSyncDot(state){
  const d=document.getElementById('sync-dot'); if(!d) return;
  const c={syncing:'#FCD34D',ok:'#4ADE80',err:'#F87171'};
  d.style.background=c[state]||'#ccc';
  d.title=state==='ok'?'Synced':state==='syncing'?'Syncing...':'Sync error — saved locally';
}
async function syncRemote(){
  setSyncDot('syncing');
  const data={done:S.done,pts:S.pts,misses:S.misses,sessions:S.sessions};
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/state`,{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({id:SUPA_ID,data}),
    });
    setSyncDot(r.ok?'ok':'err');
  }catch{ setSyncDot('err'); }
}
async function loadRemote(){
  setSyncDot('syncing');
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/state?id=eq.${SUPA_ID}&select=data`,{
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`},
    });
    const rows=await r.json();
    if(rows.length&&rows[0].data){
      const d=rows[0].data;
      if(d.done)      S.done=d.done;
      if(d.pts)       S.pts=d.pts;
      if(d.misses)    S.misses=d.misses;
      if(d.sessions)  S.sessions=d.sessions;
      save('done',S.done);save('pts',S.pts);save('misses',S.misses);save('sessions',S.sessions);
    }
    setSyncDot('ok');
  }catch{ setSyncDot('err'); }
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function tod(){ return new Date().toLocaleDateString('en-CA',{timeZone:'America/New_York'}); }
function daysUntil(ds){
  const n=new Date(); n.setHours(0,0,0,0);
  return Math.ceil((new Date(ds+'T00:00:00')-n)/86400000);
}
function fmtDate(ds){ return new Date(ds+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function tags(types){ return types.map(t=>`<span class="tag tag-${t}">${t==='condr'?'CondR':t.toUpperCase()}</span>`).join(' '); }
function fmtTs(ts){ return new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }

function streak(){
  const td=tod(); let s=0;
  const d=new Date(td+'T00:00:00');
  for(let i=0;i<200;i++){
    const ds=d.toISOString().split('T')[0];
    const e=byDate[ds];
    if(!e) break;
    if(e.types.includes('rest')){ d.setDate(d.getDate()-1); continue; }
    if(S.done[ds]) s++;
    else if(ds===td){ d.setDate(d.getDate()-1); continue; }
    else break;
    d.setDate(d.getDate()-1);
  }
  return s;
}

function getMondayKey(ds){
  const d=new Date(ds+'T00:00:00'), day=d.getDay();
  const m=new Date(d); m.setDate(d.getDate()+(day===0?-6:1-day));
  return m.toISOString().split('T')[0];
}
function wkRange(days){
  const fl=days[0].label.replace(/^\S+ /,'');
  const ll=days[days.length-1].label.replace(/^\S+ /,'');
  const [fm]=fl.split(' '),[lm]=ll.split(' ');
  return fm===lm?`${fl}–${ll.split(' ')[1]}`:`${fl}–${ll}`;
}

function linReg(pts){
  const n=pts.length; if(n<2) return null;
  let sx=0,sy=0,sxy=0,sx2=0;
  pts.forEach(([x,y])=>{sx+=x;sy+=y;sxy+=x*y;sx2+=x*x;});
  const den=n*sx2-sx*sx; if(!den) return null;
  const m=(n*sxy-sx*sy)/den, b=(sy-m*sx)/n;
  return x=>m*x+b;
}

// ── PT CHART (SVG) ─────────────────────────────────────────────────────────
function ptChart(){
  const pts=S.pts.slice().sort((a,b)=>a.num-b.num);
  if(!pts.length) return '';
  const W=560,H=160,PL=36,PR=16,PT=10,PB=28;
  const cW=W-PL-PR, cH=H-PT-PB;
  const YMIN=140,YMAX=180;
  const sx=n=>PL+((n-1)/5)*cW;
  const sy=s=>PT+cH-((s-YMIN)/(YMAX-YMIN))*cH;
  const ty=sy(TARGET);

  // score dots & path
  const dotPts=pts.map(p=>[sx(p.num),sy(p.score)]);
  const pathD=dotPts.map(([x,y],i)=>`${i?'L':'M'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');

  // trendline
  let trendLine='';
  const reg=linReg(pts.map((p,i)=>[i,p.score]));
  if(reg&&pts.length>=2){
    const x0=sx(pts[0].num), y0=sy(Math.max(YMIN,Math.min(YMAX,reg(0))));
    const x1=sx(6), y1=sy(Math.max(YMIN,Math.min(YMAX,reg(5))));
    trendLine=`<line x1="${x0}" y1="${y0.toFixed(1)}" x2="${x1}" y2="${y1.toFixed(1)}" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="4,3" opacity=".6"/>`;
    if(reg(5)>=TARGET){
      const proj=Math.round(Math.min(180,reg(5)));
      trendLine+=`<text x="${x1+3}" y="${(y1-4).toFixed(1)}" fill="#A78BFA" font-size="10" font-family="'DM Mono',monospace">→${proj}</text>`;
    }
  }

  // y labels
  const yL=[142,151,157,163,167,172,178].map(s=>{
    if(s<YMIN||s>YMAX) return '';
    const y=sy(s).toFixed(1);
    return `<text x="${PL-4}" y="${(+y+3.5).toFixed(1)}" fill="${s===TARGET?'#A78BFA':'#ccc'}" font-size="9" text-anchor="end" font-family="'DM Mono',monospace">${s}</text>`;
  }).join('');

  // x labels
  const xL=pts.map(p=>`<text x="${sx(p.num).toFixed(1)}" y="${H-6}" fill="#bbb" font-size="9" text-anchor="middle" font-family="'DM Mono',monospace">PT${p.num}</text>`).join('');

  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" class="ptchart">
    <line x1="${PL}" y1="${ty.toFixed(1)}" x2="${W-PR}" y2="${ty.toFixed(1)}" stroke="#A78BFA" stroke-width="1" stroke-dasharray="3,3" opacity=".5"/>
    <text x="${W-PR+2}" y="${(ty+3.5).toFixed(1)}" fill="#A78BFA" font-size="9" font-family="'DM Mono',monospace">167</text>
    <line x1="${PL}" y1="${sy(BASELINE).toFixed(1)}" x2="${W-PR}" y2="${sy(BASELINE).toFixed(1)}" stroke="#ddd" stroke-width="1" stroke-dasharray="2,4" opacity=".5"/>
    ${trendLine}
    <path d="${pathD}" fill="none" stroke="#6D28D9" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dotPts.map(([x,y],i)=>`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="5" fill="#6D28D9" stroke="white" stroke-width="2"/>
    <text x="${x.toFixed(1)}" y="${(y-9).toFixed(1)}" fill="#6D28D9" font-size="11" text-anchor="middle" font-family="'DM Mono',monospace" font-weight="500">${pts[i].score}</text>`).join('')}
    ${yL}${xL}
  </svg></div>`;
}

// ── TIME ESTIMATES ─────────────────────────────────────────────────────────
function getTimeEst(d){
  if(d.types.includes('rest')) return '';
  if(d.types.includes('pt')) return '2.5 hrs';
  if(d.types.includes('review')&&d.task.toLowerCase().startsWith('pt #')) return '90 min';
  if(d.date==='2026-05-22') return '45 min — optional if traveling';
  if(d.date==='2026-05-02') return '45 min';
  if(d.date==='2026-05-04') return '75 min';
  const dow=new Date(d.date+'T00:00:00').getDay();
  return(dow===0||dow===6)?'75 min':'45 min';
}

  const note=(document.getElementById('td-note')?.value||'').trim();
  S.done[tod()]={ts:Date.now(),note};
  persist(); renderDashboard(); renderPlan();
}
function unmarkTod(){
  delete S.done[tod()]; persist(); renderDashboard(); renderPlan();
}

// ── SESSIONS ───────────────────────────────────────────────────────────────
function renderPlan(){
  const el=document.getElementById('plan');
  const td=tod();
  const todayMon=getMondayKey(td);

  // Group by calendar week (Mon–Sun)
  const wkMap={};
  plan.forEach(d=>{ const m=getMondayKey(d.date); (wkMap[m]=wkMap[m]||[]).push(d); });

  let h=`<div class="sec-title" style="margin-bottom:10px">14-Week Study Plan</div>`;

  Object.keys(wkMap).sort().forEach((mon,idx)=>{
    const days=wkMap[mon]; const wn=idx+1;
    const active=days.filter(d=>!d.types.includes('rest'));
    const done=active.filter(d=>S.done[d.date]).length;
    const isOpen=mon===todayMon;
    const label=CAL_WK_LABEL[mon]||wkRange(days);

    h+=`<div class="week-card">
      <div class="week-hdr" onclick="toggleWk('${mon}')">
        <span class="wk-num">WK ${String(wn).padStart(2,'0')}</span>
        <span class="wk-title">${label}</span>
        <span class="wk-dates">${done}/${active.length} · ${wkRange(days)}</span>

      </div>
      <div class="week-body${isOpen?' open':''}" id="wb${mon}">`;

    days.forEach(d=>{
      const isToday=d.date===td;
      const isDone=!!S.done[d.date];
      const isRest=d.types.includes('rest');
      const note=S.done[d.date]?.note||'';
      h+=`<div class="day-row${isToday?' is-today':''}${isRest?' is-rest':''}">
        <div class="day-dname">${d.label}${getTimeEst(d)?`<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);margin-top:2px">${getTimeEst(d)}</div>`:''}</div>
        <div>
          <div class="day-task">${esc(d.task)}</div>
          <div class="day-tags">${tags(d.types)}</div>
          ${isDone&&note?`<div class="day-note-text">"${esc(note)}"</div>`:''}
          ${isDone?`<div style="display:flex;gap:5px;align-items:center;margin-top:6px">
            <span style="font-size:11px;color:#15803D;font-family:'DM Mono',monospace">✓ done</span>
            <button class="btn btn-sm btn-danger" style="padding:2px 7px;font-size:10px" onclick="unmarkDay('${d.date}')">undo</button>
            <button class="btn btn-sm btn-secondary" style="padding:2px 7px;font-size:10px" onclick="editNote('${d.date}')">edit note</button>
          </div>`:(!isRest?`<div class="note-row" id="nr-${d.date}">
            <input type="text" id="n-${d.date}" placeholder="Note..." onkeydown="if(event.key==='Enter')markDay('${d.date}')">
            <button class="btn btn-primary btn-sm" onclick="markDay('${d.date}')">Done</button>
          </div>`:'')}
        </div>
        ${!isRest?`<button class="check-btn${isDone?' done':''}" onclick="${isDone?`unmarkDay('${d.date}')`:`markDay('${d.date}')`}">${isDone?'✓':''}</button>`:'<div></div>'}
      </div>`;
    });
    h+=`</div></div>`;
  });

  // Notes feed
  const feed=Object.entries(S.done).filter(([,v])=>v.note).sort((a,b)=>b[1].ts-a[1].ts);
  if(feed.length){
    h+=`<div class="sec-title" style="margin-top:20px;margin-bottom:8px">Session Notes</div><div class="card card-sm">`;
    feed.forEach(([date,{note,ts}])=>{
      const e=byDate[date];
      h+=`<div class="snote"><div class="snote-date">${e?e.label:date} · ${fmtTs(ts)}</div><div class="snote-text">${esc(note)}</div></div>`;
    });
    h+=`</div>`;
  }

  el.innerHTML=h;

function toggleWk(wk){
  const b=document.getElementById(`wb${wk}`), c=document.getElementById(`ch${wk}`);
  const open=b.classList.toggle('open');
  if(c) c.style.transform=open?'rotate(180deg)':'';
}
function markDay(date){
  const note=(document.getElementById(`n-${date}`)?.value||'').trim();
  S.done[date]={ts:Date.now(),note}; persist();
  renderPlan(); if(date===tod()) renderDashboard();
}
function unmarkDay(date){
  delete S.done[date]; persist();
  renderPlan(); if(date===tod()) renderDashboard();
}
function editNote(date){
  const cur=S.done[date]?.note||'';
  const n=prompt('Edit note:',cur);
  if(n===null) return;
  S.done[date]={...(S.done[date]||{}),note:n,ts:Date.now()}; persist();
  renderPlan(); renderDashboard();
}

// ── PT TRACKER ─────────────────────────────────────────────────────────────
function renderPT(){
  const el=document.getElementById('pt');
  const pts=S.pts.slice().sort((a,b)=>a.num-b.num);
  let h='';

  // Plateau warning
  if(pts.length>=3){
    const l3=pts.slice(-3).map(p=>p.score);
    if(Math.max(...l3)-Math.min(...l3)<=2){
      h+=`<div style="background:var(--amber-lt);border:1px solid #FCD34D;border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:13px;color:var(--amber)">
        <strong style="font-family:'DM Mono',monospace;font-size:10px">⚠ PLATEAU</strong> — Last 3 PTs within 2 points. Bring your miss breakdowns to Claude for targeted drilling.
      </div>`;
    }
  }

  // Chart
  if(pts.length>0){
    h+=`<div class="card card-sm" style="margin-bottom:10px"><div class="sec-title">Score Progression</div>${ptChart()}</div>`;

    // Projection
    const reg=linReg(pts.map((p,i)=>[i,p.score]));

        <span style="font-family:'DM Mono',monospace;font-size:10px;color:${gap<=0?'var(--green)':'var(--faint)'};">${gap<=0?'+'+Math.abs(gap):'-'+gap}</span>
        <span style="font-size:10px;color:var(--faint)">${p.date}</span>
        <button style="background:none;border:none;color:var(--faint);cursor:pointer;font-size:16px;padding:0 2px;line-height:1" onclick="delPT(${p.num})">×</button>
      </div>`;
    });
    h+=`</div>`;
  }

  el.innerHTML=h;
}

function logPT(){
  const num=+document.getElementById('pt-num').value;
  const date=document.getElementById('pt-date').value;
  const score=+document.getElementById('pt-score').value;
  const lr=document.getElementById('pt-lr').value;
  const rc=document.getElementById('pt-rc').value;
  const note=(document.getElementById('pt-note').value||'').trim();
  if(!score||score<120||score>180){alert('Enter a valid score (120–180)');return;}
  S.pts=S.pts.filter(p=>p.num!==num);
  S.pts.push({num,date,score,lr:lr?+lr:null,rc:rc?+rc:null,note});
  S.pts.sort((a,b)=>a.num-b.num);
  persist(); renderPT(); renderDashboard();
}
function delPT(num){
  if(!confirm(`Delete PT ${num}?`)) return;
  S.pts=S.pts.filter(p=>p.num!==num); persist(); renderPT(); renderDashboard();
}

// ── MISS TRACKER ───────────────────────────────────────────────────────────
// Question types — single per question. Mirrors 7sage's official taxonomy
// (17 LR, 13 RC). https://7sage.com/lr-question-types · /rc-question-types
const QTYPES = [
  // LR — Argument structure
  {id:'mc',       label:'Main Conclusion',           s:'LR'},
  {id:'argpart',  label:'Argument Part',             s:'LR'},
  {id:'mor',      label:'Method of Reasoning',       s:'LR'},
  // LR — Assumptions / flaws
  {id:'flaw',     label:'Flaw',                      s:'LR'},
  {id:'na',       label:'Necessary Assumption',      s:'LR'},
  {id:'sa',       label:'Sufficient Assumption',     s:'LR'},
  {id:'streng',   label:'Strengthen',                s:'LR'},
  {id:'weak',     label:'Weaken',                    s:'LR'},
  {id:'eval',     label:'Evaluate',                  s:'LR'},
  // LR — Inferences
  {id:'mbt',      label:'Must Be True',              s:'LR'},
  {id:'mss',      label:'Most Strongly Supported',   s:'LR'},
  // LR — Principles
  {id:'psa',      label:'PSA: Find the Rule',        s:'LR'},
  {id:'psaa',     label:'PSA: Apply the Rule',       s:'LR'},
  // LR — Parallel
  {id:'para',     label:'Parallel MoR',              s:'LR'},
  {id:'pf',       label:'Parallel Flaw',             s:'LR'},
  // LR — Other
  {id:'rre',      label:'Resolve / Reconcile / Explain', s:'LR'},
  {id:'pai',      label:'Point at Issue',            s:'LR'},
  // RC — Overall structure
  {id:'rc-mp',    label:'Main Point',                s:'RC'},
  {id:'rc-pp',    label:'Purpose of Passage',        s:'RC'},
  {id:'rc-org',   label:'Describe Organization',     s:'RC'},
  // RC — Internal structure
  {id:'rc-pop',   label:'Purpose of Paragraph',      s:'RC'},
  {id:'rc-mic',   label:'Meaning in Context',        s:'RC'},
  {id:'rc-pic',   label:'Purpose in Context',        s:'RC'},
  // RC — Stated / implied
  {id:'rc-stated',label:'Stated',                    s:'RC'},
  {id:'rc-impl',  label:'Implied',                   s:'RC'},
  {id:'rc-att',   label:'Author\'s Attitude',        s:'RC'},
  // RC — Other
  {id:'rc-app',   label:'Application',               s:'RC'},
  {id:'rc-ana',   label:'RC Analogy',                s:'RC'},
  {id:'rc-lc',    label:'Logical Continuation',      s:'RC'},
  {id:'rc-wse',   label:'Weaken / Strengthen / Eval',s:'RC'},
];
function qtLabel(id){ return QTYPES.find(q=>q.id===id)?.label||id; }

// Stimulus tags — multi per question. Mirrors 7sage's 15 LR stimulus tags
// plus a few sub-tags (SuffvNec, Factors) seen in their assignment tagging.
// https://7sage.com/blog/new-lr-tags-in-7sage
const STIMULUS_TAGS = [
  {id:'an',       label:'Analogy',         s:'LR'},
  {id:'causr',    label:'CausR',           s:'LR'},
  {id:'condr',    label:'CondR',           s:'LR'},
  {id:'elimopt',  label:'ElimOpt',         s:'LR'},
  {id:'fvbvk',    label:'FvBvK',           s:'LR'},
  {id:'kiu',      label:'KIU',             s:'LR'},
  {id:'lsvfc',    label:'LSvFC',           s:'LR'},
  {id:'linka',    label:'LinkA',           s:'LR'},
  {id:'math',     label:'Math',            s:'LR'},
  {id:'neteff',   label:'NetEff',          s:'LR'},
  {id:'pvw',      label:'PvW',             s:'LR'},
  {id:'quant',    label:'Quant',           s:'LR'},
  {id:'ruleapp',  label:'RuleApp',         s:'LR'},
  {id:'smpl',     label:'Smpl',            s:'LR'},
  {id:'valjudg',  label:'ValJudg',         s:'LR'},
  {id:'corr',     label:'Correlation',     s:'LR'},
  {id:'phenhy',   label:'Phen-Hyp',        s:'LR'},
  {id:'equiv',    label:'Equivocation',    s:'LR'},
  // Sub-tags 7sage uses inside drill tagging
  {id:'suffvnec', label:'SuffvNec',        s:'LR'},
  {id:'factors',  label:'Factors',         s:'LR'},
  // RC — passage types
  {id:'rc-law',   label:'Law',             s:'RC'},
  {id:'rc-sci',   label:'Science',         s:'RC'},
  {id:'rc-div',   label:'Diversity',       s:'RC'},
  {id:'rc-comp',  label:'Comparative',     s:'RC'},
];
function tagLabel(id){ return STIMULUS_TAGS.find(t=>t.id===id)?.label||id; }

function renderPractice(){
  const el=document.getElementById('practice');
  const log=S.misses;

  // Aggregate by question type
  const agg={};
  log.forEach(m=>{
    if(!m.type) return;
    if(!agg[m.type]) agg[m.type]={tot:0,miss:0};
    agg[m.type].tot++;
    if(!m.correct) agg[m.type].miss++;
  });
  const byMiss=Object.entries(agg).filter(([,v])=>v.tot>0).sort((a,b)=>b[1].miss-a[1].miss);
  const maxM=Math.max(1,...byMiss.map(([,v])=>v.miss));
  const top3=byMiss.filter(([,v])=>v.miss>0).slice(0,3);

  // Aggregate by stimulus tag
  const tagAgg={};
  log.forEach(m=>{
    (m.tags||[]).forEach(t=>{
      if(!tagAgg[t]) tagAgg[t]={tot:0,miss:0};
      tagAgg[t].tot++;
      if(!m.correct) tagAgg[t].miss++;
    });
  });
  const tagByMiss=Object.entries(tagAgg).filter(([,v])=>v.tot>0).sort((a,b)=>b[1].miss-a[1].miss);
  const tagMaxM=Math.max(1,...tagByMiss.map(([,v])=>v.miss));

  let h='';

  // Editing state declared up front — referenced by forms below and by post-render setup
  const editingS=editingSessionIdx!=null?S.sessions[editingSessionIdx]:null;
  const editing=editingIdx!=null?S.misses[editingIdx]:null;

  // ── Zone: TODAY ─────────────────────────────────────────────
  h+=`<div class="zone-hdr">Today</div>`;

  h+=`<div class="card">
    <div class="sec-title">${editingS?'Edit Drill Session':'Log Drill Session'}</div>
    <div class="form2">
      <div class="fg"><label>Date</label>
        <input type="date" id="s-date" value="${editingS?.date||tod()}">
      </div>
      <div class="fg"><label>Section</label>
        <select id="s-section" onchange="refreshSessionTopics()">
          <option value="LR"${(!editingS||editingS.section==='LR')?' selected':''}>LR</option>
          <option value="RC"${editingS?.section==='RC'?' selected':''}>RC</option>
          <option value="Mixed"${editingS?.section==='Mixed'?' selected':''}>Mixed</option>
        </select>
      </div>
    </div>
    <div class="form2">
      <div class="fg"><label>Total</label>
        <input type="number" id="s-total" min="1" max="200" value="${editingS?.total??20}">
      </div>
      <div class="fg"><label>Correct</label>
        <input type="number" id="s-correct" min="0" max="200" value="${editingS?.correct??''}">
      </div>
    </div>
    <div class="fg">
      <label>Topics <span style="color:var(--faint);font-weight:normal">(stimulus tags drilled — multi)</span></label>
      <div class="chip-row" id="s-topics"></div>
    </div>
    <div class="fg"><label>Note <span style="color:var(--faint);font-weight:normal">(optional)</span></label>
      <input type="text" id="s-note" placeholder="e.g. Ch 4 drill, untimed" value="${esc(editingS?.note||'')}">
    </div>
    <button class="btn btn-primary" onclick="logSession()">${editingS?'Update':'Log Session'}</button>
    ${editingS?`<button class="btn btn-secondary" style="margin-left:8px" onclick="cancelEditSession()">Cancel</button>`:''}
  </div>`;

  h+=`<div class="card">
    <div class="sec-title">${editing?'Edit Entry':'Log Question'}</div>
    <div class="form2">
      <div class="fg"><label>Section</label>
        <select id="m-section" onchange="refreshMissTypes()">
          <option value="LR">LR</option><option value="RC">RC</option>
        </select>
      </div>
      <div class="fg"><label>Result</label>
        <select id="m-correct" onchange="refreshMissFields()">
          <option value="0">Missed ✗</option>
          <option value="1">Correct ✓</option>
        </select>
      </div>
    </div>
    <div class="fg"><label>Question Type</label><select id="m-type"></select></div>
    <div class="fg" id="m-tags-wrap">
      <label>Stimulus Tags <span style="color:var(--faint);font-weight:normal">(skills / structure — multi)</span></label>
      <div class="chip-row" id="m-tags"></div>
    </div>
    <div class="fg"><label>Ref <span style="color:var(--faint);font-weight:normal">(optional)</span></label>
      <input type="text" id="m-ref" placeholder="e.g. PT117.S2.Q8" style="font-family:'DM Mono',monospace;font-size:12px" value="${esc(editing?.ref||'')}">
    </div>
    <div class="fg" id="m-trap-wrap"><label>Trap I picked</label>
      <input type="text" id="m-trap" placeholder="Why the wrong answer pulled me" value="${esc(editing?.trap||'')}">
    </div>
    <div class="fg" id="m-note-wrap"><label>Lesson / takeaway</label>
      <input type="text" id="m-note" placeholder="What I'd tell myself next time" value="${esc(editing?.note||'')}">
    </div>
    <button class="btn btn-primary" onclick="logMiss()">${editing?'Update':'Log'}</button>
    ${editing?`<button class="btn btn-secondary" style="margin-left:8px" onclick="cancelEdit()">Cancel</button>`:''}
  </div>`;

  // ── Zone: ANALYTICS ─────────────────────────────────────────
  const hasAnalytics=S.sessions.length||top3.length||tagByMiss.length||byMiss.length>3;
  if(hasAnalytics){
    h+=`<div class="zone-hdr">Analytics</div>`;

    if(S.sessions.length){
      const topicAgg={};
      const mixedAgg={};
      let totalQ=0,totalC=0;
      S.sessions.forEach(s=>{
        totalQ+=+s.total||0; totalC+=+s.correct||0;
        const topics=s.topics||[];
        if(topics.length===1){
          const t=topics[0];
          if(!topicAgg[t]) topicAgg[t]={tot:0,cor:0};
          topicAgg[t].tot+=+s.total||0;
          topicAgg[t].cor+=+s.correct||0;
        } else {
          const key=(s.section||'LR')+' · '+(topics.length
            ? topics.map(t=>tagLabel(t)).join(' + ')
            : 'mixed');
          if(!mixedAgg[key]) mixedAgg[key]={tot:0,cor:0};
          mixedAgg[key].tot+=+s.total||0;
          mixedAgg[key].cor+=+s.correct||0;
        }
      });
      const topics=Object.entries(topicAgg).sort((a,b)=>(a[1].cor/a[1].tot)-(b[1].cor/b[1].tot));
      const mixed=Object.entries(mixedAgg).sort((a,b)=>a[0].localeCompare(b[0]));
      const overallPct=totalQ?Math.round(totalC/totalQ*100):0;
      h+=`<div class="card card-sm" style="margin-bottom:10px">
        <div class="sec-title">Drill Accuracy <span style="color:var(--faint);text-transform:none;letter-spacing:0">· ${totalC}/${totalQ} (${overallPct}%) across ${S.sessions.length} session${S.sessions.length===1?'':'s'}</span></div>`;
      topics.forEach(([id,v])=>{
        const pct=v.tot?Math.round(v.cor/v.tot*100):0;
        const barColor=pct<70?'#DC2626':pct<85?'var(--pink)':'var(--green)';
        h+=`<div class="weak-row">
          <span class="weak-name" style="min-width:90px">${tagLabel(id)}</span>
          <div class="weak-bar-bg"><div class="weak-bar" style="width:${Math.max(2,pct)}%;background:${barColor}"></div></div>
          <span class="weak-ct">${v.cor}/${v.tot}</span>
          <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);min-width:30px;text-align:right">${pct}%</span>
        </div>`;
      });
      mixed.forEach(([sec,v])=>{
        const pct=v.tot?Math.round(v.cor/v.tot*100):0;
        const barColor=pct<70?'#DC2626':pct<85?'var(--pink)':'var(--green)';
        h+=`<div class="weak-row">
          <span class="weak-name" style="min-width:90px;color:var(--muted)">${sec}</span>
          <div class="weak-bar-bg"><div class="weak-bar" style="width:${Math.max(2,pct)}%;background:${barColor}"></div></div>
          <span class="weak-ct">${v.cor}/${v.tot}</span>
          <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);min-width:30px;text-align:right">${pct}%</span>
        </div>`;
      });
      if(!topics.length&&!mixed.length){
        h+=`<div style="font-size:12px;color:var(--faint);padding:4px 0">No sessions yet.</div>`;
      }
      h+=`</div>`;
    }

    if(top3.length){
      h+=`<div class="card card-sm" style="margin-bottom:10px"><div class="sec-title">Top Weak Types</div>`;
      top3.forEach(([id,v],i)=>{
        h+=`<div class="weak-row">
          <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--purple);min-width:18px">#${i+1}</span>
          <span class="weak-name">${qtLabel(id)}</span>
          <div class="weak-bar-bg"><div class="weak-bar" style="width:${(v.miss/maxM)*100}%"></div></div>
          <span class="weak-ct">${v.miss} miss</span>
        </div>`;
      });
      h+=`</div>`;
    }

    if(tagByMiss.length){
      const tagTop=tagByMiss.filter(([,v])=>v.miss>0).slice(0,8);
      if(tagTop.length){
        h+=`<div class="card card-sm" style="margin-bottom:10px"><div class="sec-title">Top Weak Tags <span style="color:var(--faint);text-transform:none;letter-spacing:0">(stimulus / skills)</span></div>`;
        tagTop.forEach(([id,v])=>{
          h+=`<div class="weak-row">
            <span class="weak-name" style="min-width:90px">${tagLabel(id)}</span>
            <div class="weak-bar-bg"><div class="weak-bar" style="width:${(v.miss/tagMaxM)*100}%;background:var(--purple)"></div></div>
            <span class="weak-ct">${v.miss} miss</span>
          </div>`;
        });
        h+=`</div>`;
      }
    }

    if(byMiss.length>3){
      h+=`<div class="card card-sm" style="margin-bottom:10px"><div class="sec-title">All Types</div>`;
      byMiss.forEach(([id,v])=>{
        const qt=QTYPES.find(q=>q.id===id);
        h+=`<div class="weak-row">
          <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--faint);min-width:22px">${qt?.s||''}</span>
          <span class="weak-name" style="min-width:150px">${qtLabel(id)}</span>
          <div class="weak-bar-bg"><div class="weak-bar" style="width:${(v.miss/maxM)*100}%;background:var(--pink)"></div></div>
          <span class="weak-ct">${v.miss} miss</span>
        </div>`;
      });
      h+=`</div>`;
    }
  }

  // ── Zone: HISTORY ───────────────────────────────────────────
  const hasHistory=S.sessions.length||log.length;
  if(hasHistory){
    h+=`<div class="zone-hdr">History</div>`;

    if(S.sessions.length){
      const recentSess=S.sessions.slice().sort((a,b)=>b.ts-a.ts).slice(0,5);
      h+=`<div class="card card-sm" style="margin-bottom:10px"><div class="sec-title">Recent Drills</div>`;
      recentSess.forEach(s=>{
        const origIdx=S.sessions.indexOf(s);
        const pct=s.total?Math.round(s.correct/s.total*100):0;
        const chips=(s.topics||[]).map(t=>`<span class="chip readonly">${tagLabel(t)}</span>`).join('');
        const secLabel=s.section||'LR';
        h+=`<div class="miss-item">
          <span class="miss-badge" style="background:var(--purple-lt);color:var(--purple)">${s.correct}/${s.total} · ${pct}%</span>
          <div style="flex:1;min-width:0">
            <div class="chip-row"><span class="chip readonly" style="background:var(--blue-lt,#dbeafe);color:var(--blue,#1d4ed8)">${secLabel}</span>${chips}</div>
            ${s.note?`<div style="font-size:12px;margin-bottom:2px">${esc(s.note)}</div>`:''}
            <div class="miss-meta">${fmtDate(s.date)}</div>
          </div>
          <button style="background:none;border:none;color:var(--faint);cursor:pointer;font-size:14px;padding:0 4px;line-height:1" onclick="editSession(${origIdx})" title="Edit">✎</button>
          <button style="background:none;border:none;color:var(--faint);cursor:pointer;font-size:16px;padding:0 4px;line-height:1" onclick="delSession(${origIdx})" title="Delete">×</button>
        </div>`;
      });
      h+=`</div>`;
    }

    if(log.length){
      const recent=log.slice().reverse().slice(0,25);
      h+=`<div class="card card-sm" style="margin-bottom:10px"><div class="sec-title">Recent Misses</div>`;
      recent.forEach((m,i)=>{
        const orig=log.length-1-i;
        const bg=m.correct?'var(--green-lt)':'var(--red-lt)';
        const tc=m.correct?'var(--green)':'var(--red)';
        const tagChips=(m.tags||[]).map(t=>`<span class="chip readonly">${tagLabel(t)}</span>`).join('');
        h+=`<div class="miss-item">
          <span class="miss-badge" style="background:${bg};color:${tc}">${m.correct?'✓':'✗'} ${qtLabel(m.type)}</span>
          <div style="flex:1;min-width:0">
            ${m.ref?`<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--purple);margin-bottom:2px">${esc(m.ref)}</div>`:''}
            ${tagChips?`<div class="chip-row">${tagChips}</div>`:''}
            ${m.trap?`<div style="font-size:12px;color:var(--muted);margin-bottom:2px"><span style="color:var(--faint)">trap:</span> ${esc(m.trap)}</div>`:''}
            ${m.note?`<div style="font-size:12px;margin-bottom:2px">${esc(m.note)}</div>`:''}
            <div class="miss-meta">${m.section} · ${new Date(m.ts).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
          </div>
          <button style="background:none;border:none;color:var(--faint);cursor:pointer;font-size:14px;padding:0 4px;line-height:1" onclick="editMiss(${orig})" title="Edit">✎</button>
          <button style="background:none;border:none;color:var(--faint);cursor:pointer;font-size:16px;padding:0 4px;line-height:1" onclick="delMiss(${orig})" title="Delete">×</button>
        </div>`;
      });
      h+=`</div>`;
    }
  }

  el.innerHTML=h;
  if(editing){
    document.getElementById('m-section').value=editing.section;
    document.getElementById('m-correct').value=editing.correct?'1':'0';
  }
  refreshMissTypes();
  if(editing) document.getElementById('m-type').value=editing.type;
  refreshMissTags(editing?.tags||[]);
  refreshSessionTopics(editingS?.topics||[]);
  refreshMissFields();
}

let editingIdx=null;
let editingSessionIdx=null;

function logSession(){
  const date=document.getElementById('s-date').value||tod();
  const section=document.getElementById('s-section').value||'LR';
  const totalRaw=document.getElementById('s-total').value;
  const correctRaw=document.getElementById('s-correct').value;
  if(totalRaw===''||correctRaw==='') return;
  const total=+totalRaw, correct=+correctRaw;
  const note=(document.getElementById('s-note').value||'').trim();
  const topics=chipsSelected('s-topics');
  if(!total||correct<0||correct>total) return;
  if(editingSessionIdx!=null){
    const orig=S.sessions[editingSessionIdx];
    S.sessions[editingSessionIdx]={...orig,date,section,topics,total,correct,note};
    editingSessionIdx=null;
  } else {
    S.sessions.push({ts:Date.now(),date,section,topics,total,correct,note});
  }
  persist(); renderPractice();
}
function editSession(idx){
  editingSessionIdx=idx; renderPractice();
  document.getElementById('practice')?.scrollIntoView({behavior:'smooth',block:'start'});
}
function cancelEditSession(){
  editingSessionIdx=null; renderPractice();
}
function delSession(idx){
  if(editingSessionIdx===idx) editingSessionIdx=null;
  else if(editingSessionIdx!=null && idx<editingSessionIdx) editingSessionIdx--;
  S.sessions.splice(idx,1); persist(); renderPractice();
}

function fillChipRow(rowId, items, selected){
  const row=document.getElementById(rowId);
  if(!row) return;
  const sel=new Set(selected||[]);
  row.innerHTML=items.map(t=>`<span class="chip${sel.has(t.id)?' active':''}" data-tag="${t.id}" onclick="toggleChip(this)">${t.label}</span>`).join('');
}
function toggleChip(el){ el.classList.toggle('active'); }
function chipsSelected(rowId){
  return Array.from(document.querySelectorAll(`#${rowId} .chip.active`)).map(c=>c.dataset.tag);
}

function refreshSessionTopics(selected){
  const s=document.getElementById('s-section')?.value||'LR';
  const tags=s==='Mixed'?STIMULUS_TAGS:STIMULUS_TAGS.filter(t=>t.s===s);
  fillChipRow('s-topics', tags, selected||chipsSelected('s-topics'));
}
function refreshMissFields(){
  const isCorrect=document.getElementById('m-correct')?.value==='1';
  const trapWrap=document.getElementById('m-trap-wrap');
  const noteWrap=document.getElementById('m-note-wrap');
  if(!trapWrap||!noteWrap) return;
  if(isCorrect){
    trapWrap.style.display='none';
    noteWrap.style.display='none';
    document.getElementById('m-trap').value='';
    document.getElementById('m-note').value='';
  } else {
    trapWrap.style.display='';
    noteWrap.style.display='';
  }
}
function refreshMissTypes(){
  const s=document.getElementById('m-section')?.value;
  const sel=document.getElementById('m-type');
  if(!sel) return;
  sel.innerHTML=QTYPES.filter(q=>q.s===s).map(q=>`<option value="${q.id}">${q.label}</option>`).join('');
  refreshMissTags(chipsSelected('m-tags'));
}
function refreshMissTags(selected){
  const s=document.getElementById('m-section')?.value;
  const wrap=document.getElementById('m-tags-wrap');
  if(!wrap) return;
  const avail=STIMULUS_TAGS.filter(t=>t.s===s);
  if(!avail.length){ wrap.style.display='none'; const row=document.getElementById('m-tags'); if(row) row.innerHTML=''; return; }
  wrap.style.display='';
  fillChipRow('m-tags', avail, selected);
}
function logMiss(){
  const section=document.getElementById('m-section').value;
  const type=document.getElementById('m-type').value;
  const correct=document.getElementById('m-correct').value==='1';
  const tags=chipsSelected('m-tags');
  const ref=(document.getElementById('m-ref').value||'').trim();
  const trap=(document.getElementById('m-trap').value||'').trim();
  const note=(document.getElementById('m-note').value||'').trim();
  if(editingIdx!=null){
    const orig=S.misses[editingIdx];
    S.misses[editingIdx]={...orig,section,type,tags,correct,ref,trap,note};
    editingIdx=null;
  } else {
    S.misses.push({ts:Date.now(),section,type,tags,correct,ref,trap,note});
  }
  persist(); renderPractice();
}
function editMiss(idx){
  editingIdx=idx; renderPractice();
  document.getElementById('practice')?.scrollIntoView({behavior:'smooth',block:'start'});
}
function cancelEdit(){
  editingIdx=null; renderPractice();
}
function delMiss(idx){
  if(editingIdx===idx) editingIdx=null;
  else if(editingIdx!=null && idx<editingIdx) editingIdx--;
  S.misses.splice(idx,1); persist(); renderPractice();
}


// ── NAV ────────────────────────────────────────────────────────────────────
document.querySelectorAll('nav button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    btn.classList.add('active');
    const tab=btn.dataset.tab;
    document.getElementById(tab).classList.add('active');

    if(tab==='plan')      renderPlan();
    if(tab==='pt')        renderPT();
    if(tab==='practice')  renderPractice();
  });
});

// ── INIT ───────────────────────────────────────────────────────────────────
(async()=>{ await loadRemote(); renderDashboard(); })();
</script>
